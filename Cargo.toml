[package]
name = "livro-e-cia"
version = "0.1.0"
edition = "2024"

[dependencies]
# Database
diesel = { version = "2.3", features = ["postgres", "r2d2", "chrono", "uuid"] }
diesel_migrations = "2.3"
uuid = { version = "1.19.0", features = ["v4", "serde"] }
chrono = { version = "0.4.42", features = ["serde"]}

# Environment Variables
dotenvy = "0.15"
